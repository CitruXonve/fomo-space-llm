services:
  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - faq-network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fomospace-api-server
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS}
    env_file:
      - .env
    volumes:
      - ./.models:/app/.models
      - ./.embedding_cache:/app/.embedding_cache
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - faq-network

networks:
  faq-network:
    driver: bridge
